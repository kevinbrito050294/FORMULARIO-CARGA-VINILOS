<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vinilos Widget - Carga Manual</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 10px; background: transparent; color: #37352f; }
        .container { background: white; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        
        /* Bloques de Totales Manuales */
        .summary-cards { display: flex; gap: 15px; margin-bottom: 20px; }
        .card { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #eee; background: #fbfbfa; border-left: 4px solid #0665d0; }
        .card label { display: block; font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .card input { border: 1px solid #ddd; background: white; font-size: 16px; font-weight: bold; color: #37352f; width: 100%; padding: 5px; border-radius: 4px; box-sizing: border-box; }

        .scroll-container { overflow-x: auto; margin-bottom: 15px; border-radius: 4px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 12px; }
        th, td { border: 1px solid #efefef; padding: 8px; text-align: left; }
        th { background-color: #f7f7f7; color: #666; font-weight: 600; }
        
        input { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #0665d0; outline: none; background-color: #f9f9ff; }

        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: 600; font-size: 13px; transition: 0.2s; }
        .add-btn { background-color: #23835c; color: white; }
        .add-btn:hover { background-color: #1e6d4d; }
        .dl-btn { background-color: #0665d0; color: white; }
        .dl-btn:hover { background-color: #0555b0; }
        .remove-btn { background-color: #eb5757; color: white; border-radius: 4px; padding: 4px 8px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="summary-cards">
        <div class="card">
            <label>Gasto General USD (Manual)</label>
            <input type="number" id="manualUSD" step="0.01" placeholder="0.00">
        </div>
        <div class="card">
            <label>Gasto General USDT (Manual)</label>
            <input type="number" id="manualUSDT" step="0.01" placeholder="0.00">
        </div>
    </div>

    <div class="scroll-container">
        <table id="vinilosTable">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Artista</th>
                    <th>Fecha</th>
                    <th>Código</th>
                    <th>Lote</th>
                    <th>Calidad</th>
                    <th>Origen</th>
                    <th>Género</th>
                    <th>$ VZLA</th>
                    <th>$ ARG (USDT)</th>
                    <th>Precio ARS</th>
                    <th>Tasa VZLA</th>
                    <th>Tasa USDT</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr class="dato-row">
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="date"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="number" step="0.01"></td>
                    <td><input type="number" step="0.01"></td>
                    <td><input type="number" step="0.01"></td>
                    <td><input type="number" step="0.01"></td>
                    <td><input type="number" step="0.01"></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="add-btn" onclick="addRow()">+ Agregar Vinilo</button>
        <button class="dl-btn" onclick="exportToExcel()">Descargar Excel</button>
    </div>
</div>

<script>
    function addRow() {
        const table = document.querySelector("#vinilosTable tbody");
        const row = table.insertRow();
        row.className = "dato-row";
        row.innerHTML = `
            <td><input type="text"></td><td><input type="text"></td>
            <td><input type="date"></td><td><input type="text"></td>
            <td><input type="text"></td><td><input type="text"></td>
            <td><input type="text"></td><td><input type="text"></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
            <td><button class="remove-btn" onclick="this.parentElement.parentElement.remove()">×</button></td>
        `;
    }

    function exportToExcel() {
        const data = [];
        
        // Encabezados
        const headers = [
            "Titulos", "Artistas", "Fecha de Pago", "Codigo vinilo", 
            "Nro Lote", "Calidad", "Pais Origen", "Genero", 
            "COSTO en USDVNZLA", "COSTO USDT (ARG)", "Precio ARS", 
            "TASA DE CAMBIO USD VNZLA", "Tasa de cambio USDT", 
            "Gasto en USD", "Gasto USDT"
        ];
        data.push(headers);

        const mUSD = document.getElementById('manualUSD').value;
        const mUSDT = document.getElementById('manualUSDT').value;

        const dataRows = document.querySelectorAll(".dato-row");
        dataRows.forEach((row, index) => {
            const inputs = row.querySelectorAll("input");
            const rowData = Array.from(inputs).map(input => input.value);
            
            // Adjuntar los valores de los bloques manuales superiores
            if (index === 0) {
                rowData.push(mUSD, mUSDT);
            } else {
                rowData.push("", ""); 
            }
            data.push(rowData);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, "Registros");
        XLSX.writeFile(wb, "Control_Vinilos_Manual.xlsx");
    }
</script>
</body>
</html>

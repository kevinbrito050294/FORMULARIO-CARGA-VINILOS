<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carga de Vinilos - Guacamayo Records</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 16px; background: #f5f5f5; color: #37352f; }

        h2 { font-size: 18px; font-weight: 600; margin: 0 0 16px; color: #37352f; }

        .container { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

        .summary-cards { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 180px; padding: 12px 14px; border-radius: 6px; background: #f9f9f9; border: 1px solid #eee; border-left: 4px solid #0665d0; }
        .card label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
        .card input { border: 1px solid #ddd; background: white; font-size: 15px; font-weight: 700; color: #37352f; width: 100%; padding: 6px 8px; border-radius: 4px; }
        .card input:focus { border-color: #0665d0; outline: none; }

        .scroll-container { overflow-x: auto; margin-bottom: 14px; border-radius: 6px; border: 1px solid #e8e8e8; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 12px; }
        thead th { background: #f7f7f7; color: #666; font-weight: 600; padding: 9px 8px; border-bottom: 1px solid #e0e0e0; text-align: left; white-space: nowrap; }
        td { border-bottom: 1px solid #f2f2f2; padding: 3px 4px; }
        td input { width: 100%; padding: 5px 6px; border: 1px solid transparent; border-radius: 4px; background: transparent; color: #37352f; font-size: 12px; }
        td input:focus { border-color: #0665d0; outline: none; background: #f5f8ff; }
        tr:hover td { background: #fafafa; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 11px 18px; cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 13px; border: none; transition: background .15s, opacity .15s; }
        .add-btn  { background: #23835c; color: white; flex: 1; }
        .add-btn:hover  { background: #1e6d4d; }
        .dl-btn   { background: #0665d0; color: white; flex: 1; }
        .dl-btn:hover   { background: #0555b0; }
        .send-btn { background: #2d6a2d; color: white; flex: 2; }
        .send-btn:hover { background: #1e4d1e; }
        .send-btn:disabled { background: #999; cursor: not-allowed; opacity: .7; }
        .remove-btn { background: #f0f0f0; color: #777; padding: 4px 9px; font-size: 13px; border-radius: 4px; }
        .remove-btn:hover { background: #eb5757; color: white; }

        .toast { display: none; margin-top: 12px; padding: 11px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; line-height: 1.4; }
        .toast.ok   { background: #e6f4ea; color: #1e6d4d; border: 1px solid #23835c; }
        .toast.err  { background: #fdecea; color: #c0392b; border: 1px solid #eb5757; }
        .toast.info { background: #e8f0fe; color: #0555b0; border: 1px solid #0665d0; }
    </style>
</head>
<body>
<div class="container">
    <h2>Carga de Vinilos — Guacamayo Records</h2>

    <div class="summary-cards">
        <div class="card">
            <label>Gasto General USD (Manual)</label>
            <input type="number" id="manualUSD" step="0.01" placeholder="0.00">
        </div>
        <div class="card">
            <label>Gasto General USDT (Manual)</label>
            <input type="number" id="manualUSDT" step="0.01" placeholder="0.00">
        </div>
    </div>

    <div class="scroll-container">
        <table id="vinilosTable">
            <thead>
                <tr>
                    <th>Título</th><th>Artista</th><th>Fecha</th><th>Código</th>
                    <th>Lote</th><th>Calidad</th><th>Origen</th><th>Género</th>
                    <th>$ VZLA</th><th>$ ARG (USDT)</th><th>Precio ARS</th>
                    <th>Tasa VZLA</th><th>Tasa USDT</th><th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="add-btn" onclick="addRow()">+ Agregar Vinilo</button>
        <button class="dl-btn"  onclick="soloDescargar()">Descargar Excel</button>
        <button class="send-btn" id="sendBtn" onclick="descargarYEnviar()">📧 Descargar y enviar por email</button>
    </div>

    <div id="toast" class="toast"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeU062E9u5PBPc6GAkvzjjSL31bp460dOyjeOlzROa1N6AT1T1VMF4RtMvYsXc7SoRFg/exec";

    function getFileName() {
        const now  = new Date();
        const dd   = String(now.getDate()).padStart(2,'0');
        const mm   = String(now.getMonth()+1).padStart(2,'0');
        const yyyy = now.getFullYear();
        return `Carga de vinilo ${dd}-${mm}-${yyyy}.xlsx`;
    }

    function getFechaStr() {
        return new Date().toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' });
    }

    function addRow() {
        const tbody = document.querySelector("#vinilosTable tbody");
        const tr    = document.createElement('tr');
        tr.className = 'dato-row';
        tr.innerHTML = `
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="date"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
            <td><input type="number" step="0.01"></td>
            <td><button class="remove-btn" onclick="this.closest('tr').remove()">×</button></td>
        `;
        tbody.appendChild(tr);
    }

    function buildWorkbook() {
        const headers = [
            "Títulos","Artistas","Fecha de Pago","Código vinilo",
            "Nro Lote","Calidad","País Origen","Género",
            "Costo USD VZLA","Costo USDT ARG","Precio ARS",
            "Tasa USD VZLA","Tasa USDT","Gasto USD","Gasto USDT"
        ];
        const mUSD  = document.getElementById('manualUSD').value  || '';
        const mUSDT = document.getElementById('manualUSDT').value || '';
        const rows  = document.querySelectorAll('.dato-row');
        const data  = [headers];
        rows.forEach((row, i) => {
            const vals = Array.from(row.querySelectorAll('input')).map(inp => inp.value);
            vals.push(i === 0 ? mUSD : '', i === 0 ? mUSDT : '');
            data.push(vals);
        });
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, "Registros");
        return wb;
    }

    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + type;
        t.style.display = 'block';
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.style.display = 'none', 6000);
    }

    function soloDescargar() {
        const wb    = buildWorkbook();
        const fname = getFileName();
        XLSX.writeFile(wb, fname);
    }

    async function descargarYEnviar() {
        const wb    = buildWorkbook();
        const fname = getFileName();

        // 1. Descargar en la PC
        XLSX.writeFile(wb, fname);

        // 2. Enviar con adjunto via Google Apps Script
        const btn = document.getElementById('sendBtn');
        btn.disabled    = true;
        btn.textContent = 'Enviando…';
        showToast('Enviando email con el archivo adjunto…', 'info');

        try {
            const base64 = XLSX.write(wb, { bookType: 'xlsx', type: 'base64' });

            const response = await fetch(SCRIPT_URL, {
                method:  'POST',
                headers: { 'Content-Type': 'text/plain' },
                body:    JSON.stringify({
                    file:     base64,
                    filename: fname,
                    fecha:    getFechaStr()
                })
            });

            const result = await response.json();

            if (result.status === 'ok') {
                showToast('✓ Email enviado a guacamayorecords.info@gmail.com con el Excel adjunto.', 'ok');
            } else {
                showToast('Error al enviar: ' + (result.message || 'respuesta inesperada'), 'err');
            }
        } catch(err) {
            showToast('Error de red: ' + err.message, 'err');
        } finally {
            btn.disabled    = false;
            btn.textContent = '📧 Descargar y enviar por email';
        }
    }

    // Inicializar con una fila vacía
    addRow();
</script>
</body>
</html>

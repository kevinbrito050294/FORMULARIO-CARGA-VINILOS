<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Vinilos con Tasas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; }
        h2 { color: #1a2a6c; border-bottom: 2px solid #1a2a6c; padding-bottom: 10px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 95%; margin: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 1200px; }
        th, td { border: 1px solid #e0e0e0; padding: 10px; text-align: left; font-size: 13px; }
        th { background-color: #1a2a6c; color: white; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #1a2a6c; outline: none; background-color: #f9f9ff; }
        .btns { margin-top: 25px; display: flex; justify-content: space-between; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .add-btn { background-color: #27ae60; color: white; }
        .add-btn:hover { background-color: #219150; }
        .download-btn { background-color: #2980b9; color: white; }
        .download-btn:hover { background-color: #1f6391; }
        .remove-btn { background-color: #e74c3c; color: white; padding: 5px 8px; font-size: 11px; }
        .remove-btn:hover { background-color: #c0392b; }
        tr:nth-child(even) { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro Maestro de Vinilos</h2>
    <table id="vinilosTable">
        <thead>
            <tr>
                <th>Títulos</th>
                <th>Artistas</th>
                <th>Fecha de Pago</th>
                <th>Código</th>
                <th>Lote</th>
                <th>Calidad</th>
                <th>Origen</th>
                <th>Género</th>
                <th>Costo USD (VZLA)</th>
                <th>Costo USDT (ARG)</th>
                <th>Tasa USD (VZLA)</th>
                <th>Tasa USDT</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" class="titulo" placeholder="Nombre disco"></td>
                <td><input type="text" class="artista"></td>
                <td><input type="date" class="fecha"></td>
                <td><input type="text" class="codigo"></td>
                <td><input type="text" class="lote"></td>
                <td><input type="text" class="calidad"></td>
                <td><input type="text" class="pais"></td>
                <td><input type="text" class="genero"></td>
                <td><input type="number" step="0.01" class="costoVzla"></td>
                <td><input type="number" step="0.01" class="costoArg"></td>
                <td><input type="number" step="0.01" class="tasaVzla" placeholder="BS/USD"></td>
                <td><input type="number" step="0.01" class="tasaUsdt" placeholder="ARS/USDT"></td>
                <td></td>
            </tr>
        </tbody>
    </table>

    <div class="btns">
        <button class="add-btn" onclick="addRow()">+ Agregar Fila</button>
        <button class="download-btn" onclick="exportToExcel()">Generar Excel Detallado</button>
    </div>
</div>

<script>
    function addRow() {
        const table = document.getElementById("vinilosTable").getElementsByTagName('tbody')[0];
        const newRow = table.insertRow();
        newRow.innerHTML = `
            <td><input type="text" class="titulo"></td>
            <td><input type="text" class="artista"></td>
            <td><input type="date" class="fecha"></td>
            <td><input type="text" class="codigo"></td>
            <td><input type="text" class="lote"></td>
            <td><input type="text" class="calidad"></td>
            <td><input type="text" class="pais"></td>
            <td><input type="text" class="genero"></td>
            <td><input type="number" step="0.01" class="costoVzla"></td>
            <td><input type="number" step="0.01" class="costoArg"></td>
            <td><input type="number" step="0.01" class="tasaVzla"></td>
            <td><input type="number" step="0.01" class="tasaUsdt"></td>
            <td><button class="remove-btn" onclick="removeRow(this)">Eliminar</button></td>
        `;
    }

    function removeRow(btn) {
        const row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
    }

    function exportToExcel() {
        const rows = document.querySelectorAll("#vinilosTable tbody tr");
        const data = [];
        
        // Encabezados exactos de tu CSV
        const headers = [
            "Titulos(Nombres de Disco)", "Artistas", "Fecha de Pago", "Codigo vinilo", 
            "Nro Lote", "Calidad", "Pais Origen", "Genero", 
            "COSTO en USDVNZLA", "COSTO USDT (ARG)", "TASA DE CAMBIO USD VNZLA", "Tasa de cambio USDT"
        ];
        data.push(headers);

        rows.forEach(row => {
            const inputs = row.querySelectorAll("input");
            const rowData = Array.from(inputs).map(input => input.value);
            data.push(rowData);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        
        // Ajuste automático de ancho de columnas básico
        const wscols = headers.map(() => ({ wch: 20 }));
        ws['!cols'] = wscols;

        XLSX.utils.book_append_sheet(wb, ws, "Registros");
        XLSX.writeFile(wb, "Control_Vinilos_Full.xlsx");
    }
</script>

</body>
</html>
